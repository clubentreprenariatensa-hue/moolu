name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Verify Flutter setup
        run: flutter --version && flutter doctor

      - name: Clean Flutter
        run: cd NagglyApp_SourceCode && flutter clean

      - name: Get Flutter packages
        run: cd NagglyApp_SourceCode && flutter pub get

      - name: Build APK
        run: cd NagglyApp_SourceCode && flutter build apk --release

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: naggly-os-release
          path: NagglyApp_SourceCode/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: NagglyApp_SourceCode/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
